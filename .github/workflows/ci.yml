name: CI

on:
  push:
    branches: ['**']

jobs:
  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - run: uv run pytest -m unit --cov=src/snapimport --cov-fail-under=80 -q --tb=short
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: .coverage

  test-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - run: uv run pytest -m cli --cov=src/snapimport --cov-fail-under=80 -q --tb=short
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-cli
          path: .coverage

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - run: uv run pytest -m integration --cov=src/snapimport --cov-fail-under=80 -q --tb=short
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: .coverage
